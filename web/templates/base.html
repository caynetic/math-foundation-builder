<!doctype html>

    <title>{{ config.APP_TITLE }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='app.css') }}">
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="{{ url_for('home') }}">{{ config.APP_TITLE }}</a>
